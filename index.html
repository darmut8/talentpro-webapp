<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TalentPro Casino</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --lime:#C6FF3D;
    --purple:#A25BFF;
    --gold:#FFD65A;
    --gold-deep:#E0A93B;
    --bg0:#05060a;
    --bg1:#0d1018;
    --glass:rgba(255,255,255,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    color:#fff;
    background:var(--bg0);
    display:flex;flex-direction:column;
    min-height:100vh;min-height:100dvh;
    position:relative;
  }

  /* ── Живой фон ── */
  .bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
  .bg::before{
    content:"";position:absolute;inset:-50%;
    background:
      radial-gradient(circle at 30% 20%, rgba(162,91,255,.35), transparent 40%),
      radial-gradient(circle at 75% 80%, rgba(198,255,61,.22), transparent 42%),
      radial-gradient(circle at 50% 50%, rgba(255,214,90,.10), transparent 55%),
      var(--bg1);
    animation:drift 14s ease-in-out infinite alternate;
  }
  @keyframes drift{from{transform:translate(-3%,-2%) scale(1.05);}to{transform:translate(3%,2%) scale(1.15);}}
  .grain{position:fixed;inset:0;z-index:1;opacity:.05;pointer-events:none;
    background-image:radial-gradient(#fff 1px,transparent 1px);background-size:4px 4px;}

  .wrap{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;
    padding:16px 18px calc(18px + env(safe-area-inset-bottom));gap:14px;}

  /* ── Шапка ── */
  .top{display:flex;align-items:center;justify-content:space-between;}
  .logo{display:flex;flex-direction:column;line-height:1;}
  .logo b{font-size:20px;font-weight:900;letter-spacing:.5px;
    background:linear-gradient(90deg,var(--lime),#eaffb0);
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .logo span{font-size:10px;letter-spacing:3px;color:var(--purple);text-transform:uppercase;margin-top:3px;}
  .balance{
    text-align:right;background:var(--glass);border:1px solid rgba(255,214,90,.3);
    border-radius:14px;padding:7px 14px;backdrop-filter:blur(6px);
    box-shadow:0 0 18px rgba(255,214,90,.15);
  }
  .balance small{display:block;font-size:9px;letter-spacing:1.5px;color:#9aa;text-transform:uppercase;}
  .balance b{font-size:17px;color:var(--gold);text-shadow:0 0 12px rgba(255,214,90,.5);font-variant-numeric:tabular-nums;}

  /* ── Автомат ── */
  .machine{
    flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;
  }
  .cabinet{
    width:100%;max-width:400px;position:relative;border-radius:26px;padding:20px;
    background:
      linear-gradient(160deg,#1b1f2b,#0b0d14);
    border:2px solid transparent;
    background-clip:padding-box;
    box-shadow:0 30px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06);
  }
  /* золотая рамка */
  .cabinet::before{
    content:"";position:absolute;inset:-2px;border-radius:26px;z-index:-1;
    background:linear-gradient(145deg,var(--gold),var(--gold-deep) 40%,#5c4410 60%,var(--gold));
    filter:drop-shadow(0 0 14px rgba(255,214,90,.35));
  }
  .marquee{
    display:flex;gap:7px;justify-content:center;margin-bottom:14px;
  }
  .bulb{width:9px;height:9px;border-radius:50%;background:var(--gold);
    box-shadow:0 0 10px var(--gold);animation:chase 1.1s infinite;}
  .bulb:nth-child(odd){background:var(--lime);box-shadow:0 0 10px var(--lime);}
  .bulb:nth-child(3n){background:var(--purple);box-shadow:0 0 10px var(--purple);}
  .bulb:nth-child(1){animation-delay:0s}.bulb:nth-child(2){animation-delay:.12s}
  .bulb:nth-child(3){animation-delay:.24s}.bulb:nth-child(4){animation-delay:.36s}
  .bulb:nth-child(5){animation-delay:.48s}.bulb:nth-child(6){animation-delay:.6s}
  .bulb:nth-child(7){animation-delay:.72s}
  @keyframes chase{0%,100%{opacity:.25;}50%{opacity:1;}}

  .window{
    position:relative;display:flex;gap:10px;justify-content:center;
    background:radial-gradient(circle at 50% 50%,#111521,#05070d);
    border-radius:18px;padding:12px;
    box-shadow:inset 0 0 40px rgba(0,0,0,.95), inset 0 0 0 2px rgba(255,214,90,.18);
    overflow:hidden;
  }
  .reel{
    position:relative;width:33%;height:270px;overflow:hidden;border-radius:12px;
    background:linear-gradient(180deg,#10131c,#181c28);
    box-shadow:inset 0 0 20px rgba(0,0,0,.8);
  }
  .reel .strip{position:absolute;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;will-change:transform;}
  .sym{height:90px;display:flex;align-items:center;justify-content:center;font-size:54px;
    filter:drop-shadow(0 3px 5px rgba(0,0,0,.5));}
  .reel.blur .strip{filter:blur(3px);}
  /* затемнение сверху/снизу */
  .window::before,.window::after{content:"";position:absolute;left:0;right:0;height:70px;z-index:3;pointer-events:none;}
  .window::before{top:0;background:linear-gradient(180deg,#05070d,transparent);}
  .window::after{bottom:0;background:linear-gradient(0deg,#05070d,transparent);}

  /* линия выплаты */
  .payline{position:absolute;left:8px;right:8px;top:50%;height:2px;transform:translateY(-50%);
    background:linear-gradient(90deg,transparent,var(--lime),transparent);opacity:0;z-index:4;
    box-shadow:0 0 14px var(--lime);}
  .payline.on{animation:plflash .5s ease 3;}
  @keyframes plflash{0%,100%{opacity:0;}50%{opacity:1;}}

  /* ── Табло выигрыша ── */
  .winbar{height:26px;text-align:center;font-size:14px;letter-spacing:1px;color:#8a93a6;}
  .winbar b{color:var(--gold);text-shadow:0 0 12px rgba(255,214,90,.6);}

  /* ── Кнопка SPIN ── */
  .controls{width:100%;max-width:400px;display:flex;flex-direction:column;gap:10px;align-items:center;}
  .spin{
    position:relative;width:118px;height:118px;border-radius:50%;border:none;cursor:pointer;
    background:radial-gradient(circle at 50% 35%,#ffe98a,var(--gold) 45%,var(--gold-deep));
    color:#3a2b00;font-size:19px;font-weight:900;letter-spacing:1px;text-transform:uppercase;
    box-shadow:0 12px 30px rgba(255,214,90,.4), inset 0 -6px 12px rgba(140,95,0,.5), inset 0 4px 8px rgba(255,255,255,.6);
    transition:transform .08s ease;
  }
  .spin::after{content:"";position:absolute;inset:-6px;border-radius:50%;
    border:2px solid rgba(255,214,90,.35);animation:ring 2s ease-out infinite;}
  @keyframes ring{0%{transform:scale(1);opacity:.7;}100%{transform:scale(1.25);opacity:0;}}
  .spin:active{transform:scale(.93);}
  .spin:disabled{filter:grayscale(.4) brightness(.7);cursor:not-allowed;}
  .spin:disabled::after{display:none;}
  .spin small{display:block;font-size:10px;font-weight:700;opacity:.7;margin-top:2px;}

  .hintline{font-size:12px;color:#7a8194;letter-spacing:.5px;text-align:center;min-height:16px;}

  /* ── Кнопка забрать ── */
  .claim{
    width:100%;max-width:400px;border:none;border-radius:18px;padding:18px;
    font-size:17px;font-weight:800;text-transform:uppercase;letter-spacing:1px;cursor:pointer;
    background:linear-gradient(135deg,var(--lime),#8fd11f);color:#0a0a0a;
    box-shadow:0 10px 30px rgba(198,255,61,.4);display:none;transition:transform .1s;
    animation:pulseC 1.3s ease-in-out infinite;
  }
  @keyframes pulseC{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
  .claim:active{transform:scale(.97);}

  /* ── BIG WIN overlay ── */
  .overlay{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;
    align-items:center;justify-content:center;gap:6px;
    background:radial-gradient(circle at 50% 45%,rgba(20,15,0,.65),rgba(0,0,0,.9));
    backdrop-filter:blur(4px);}
  .overlay.on{display:flex;animation:fade .4s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .bigwin{font-size:46px;font-weight:900;text-transform:uppercase;letter-spacing:2px;
    background:linear-gradient(90deg,var(--gold),#fff6c8,var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 18px rgba(255,214,90,.7));animation:pop .5s cubic-bezier(.2,1.7,.4,1);}
  @keyframes pop{from{transform:scale(.3);opacity:0;}to{transform:scale(1);opacity:1;}}
  .prize{font-size:56px;font-weight:900;color:#fff;text-shadow:0 0 24px rgba(255,214,90,.9);
    font-variant-numeric:tabular-nums;}
  .prize span{font-size:32px;color:var(--gold);}
  .ovsub{font-size:13px;color:#c9cdd6;margin-top:10px;letter-spacing:1px;}

  .coin{position:fixed;top:-40px;font-size:26px;z-index:19;pointer-events:none;will-change:transform;}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grain"></div>

  <div class="wrap">
    <div class="top">
      <div class="logo"><b>TalentPro</b><span>VIP Casino</span></div>
      <div class="balance"><small>Ваш бонус</small><b id="bal">0 ₽</b></div>
    </div>

    <div class="machine">
      <div class="cabinet">
        <div class="marquee">
          <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
          <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
        </div>
        <div class="window">
          <div class="payline" id="payline"></div>
          <div class="reel"><div class="strip" id="r0"></div></div>
          <div class="reel"><div class="strip" id="r1"></div></div>
          <div class="reel"><div class="strip" id="r2"></div></div>
        </div>
      </div>
      <div class="winbar" id="winbar">Крути барабан и выигрывай 🍀</div>
    </div>

    <div class="controls">
      <button class="spin" id="spinBtn">Крутить<small id="spinsLeft">3 спина</small></button>
      <div class="hintline" id="hint">Нажми на кнопку 👆</div>
      <button class="claim" id="claimBtn">💰 Забрать бонус</button>
    </div>
  </div>

  <!-- BIG WIN -->
  <div class="overlay" id="overlay">
    <div class="bigwin">Джекпот!</div>
    <div class="prize" id="prize">0 <span>₽</span></div>
    <div class="ovsub">Ваш бонус зачислен 🎉</div>
  </div>

<script>
/* ═══════════════ Telegram WebApp ═══════════════ */
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
try{ tg.setHeaderColor("#05060a"); tg.setBackgroundColor("#05060a"); }catch(e){}

/* ═══════════════ Настройки ═══════════════ */
const SYMBOLS=["🍒","🍋","🔔","⭐","💎","7️⃣","👑","💰"];
const JACKPOT="💰";
const AMOUNTS=[2000,2500,3000,3500,4000,4500,5000];   // кратно 500
const SYM_H=90;          // высота символа (px)
const VISIBLE=3;         // видимых символов
const REEL_LEN=40;       // длина ленты
let spinsLeft=3;         // «бесплатные» вращения — вовлечение
let finished=false;
let wonAmount=0;
let spinning=false;

/* ═══════════════ Звук (Web Audio) ═══════════════ */
let AC=null;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
function tone(freq,dur,type="sine",vol=.2,delay=0){
  const c=ac(); if(!c) return;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type; o.frequency.value=freq;
  o.connect(g); g.connect(c.destination);
  const t=c.currentTime+delay;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+.01);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.start(t); o.stop(t+dur);
}
function sfxSpin(){ // нарастающее «вжух»
  const c=ac(); if(!c) return;
  const o=c.createOscillator(), g=c.createGain();
  o.type="sawtooth";
  o.frequency.setValueAtTime(120,c.currentTime);
  o.frequency.exponentialRampToValueAtTime(420,c.currentTime+1.8);
  g.gain.setValueAtTime(.08,c.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+2.2);
  o.connect(g); g.connect(c.destination);
  o.start(); o.stop(c.currentTime+2.2);
}
function sfxStop(){ tone(300,.08,"square",.15); }
function sfxWin(){ [523,659,784,1047,1319].forEach((f,i)=>tone(f,.35,"triangle",.22,i*.1)); }
function sfxCoin(){ tone(880,.06,"sine",.12); tone(1320,.08,"sine",.1,.05); }
function haptic(t){ try{ tg.HapticFeedback.impactOccurred(t); }catch(e){} }
function notify(t){ try{ tg.HapticFeedback.notificationOccurred(t); }catch(e){} }

/* ═══════════════ Барабаны ═══════════════ */
const strips=[document.getElementById("r0"),document.getElementById("r1"),document.getElementById("r2")];
function rnd(){ return SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)]; }

function buildStrip(el,centerSym){
  // Лента: случайные символы, а нужный символ ставим так, чтобы он
  // оказался на центральной линии в конце вращения.
  el.style.transition="none";
  el.style.transform="translateY(0)";
  el.innerHTML="";
  const arr=[];
  for(let i=0;i<REEL_LEN;i++) arr.push(rnd());
  // целевая позиция — предпоследний экран, центр
  const target=REEL_LEN-2;
  arr[target]=centerSym;
  arr[target-1]=Math.random()<.5?centerSym:rnd(); // иногда сверху тоже — «почти»
  arr.forEach(s=>{
    const d=document.createElement("div"); d.className="sym"; d.textContent=s; el.appendChild(d);
  });
  return target;
}

// Инициализация — показываем случайные символы
strips.forEach(el=>{
  el.innerHTML="";
  for(let i=0;i<VISIBLE+1;i++){const d=document.createElement("div");d.className="sym";d.textContent=rnd();el.appendChild(d);}
});

function spinReel(el,centerSym,duration){
  return new Promise(resolve=>{
    const target=buildStrip(el,centerSym);
    // конечное смещение: центр целевого символа на средней строке
    const finalY=-(target-1)*SYM_H;
    const reel=el.parentElement;
    reel.classList.add("blur");
    // старт из верхнего положения
    el.style.transform="translateY(0)";
    // форсируем reflow, затем запускаем плавную остановку с «отскоком»
    void el.offsetHeight;
    el.style.transition=`transform ${duration}ms cubic-bezier(.15,.85,.25,1.05)`;
    el.style.transform=`translateY(${finalY}px)`;
    const done=()=>{
      el.removeEventListener("transitionend",done);
      reel.classList.remove("blur");
      sfxStop(); haptic("light");
      resolve();
    };
    el.addEventListener("transitionend",done);
  });
}

/* ═══════════════ Логика вращения ═══════════════ */
const spinBtn=document.getElementById("spinBtn");
const claimBtn=document.getElementById("claimBtn");
const winbar=document.getElementById("winbar");
const hint=document.getElementById("hint");
const spinsLeftEl=document.getElementById("spinsLeft");
const balEl=document.getElementById("bal");
const payline=document.getElementById("payline");

function updateSpins(){
  spinsLeftEl.textContent = spinsLeft>0 ? (spinsLeft+" спин"+(spinsLeft===1?"":spinsLeft<5?"а":"ов")) : "";
}
updateSpins();

async function doSpin(){
  if(spinning||finished) return;
  spinning=true;
  spinBtn.disabled=true;
  hint.textContent="Крутим... удача рядом!";
  winbar.textContent="🎰 Вращение...";
  ac(); if(AC&&AC.state==="suspended") AC.resume();
  sfxSpin(); haptic("medium");

  const isLast = spinsLeft<=1;               // последний спин — гарантированный джекпот
  // На всех спинах ведём к джекпоту (клиент всегда должен выиграть)
  const centers=[JACKPOT,JACKPOT,JACKPOT];

  // Барабаны останавливаются по очереди; последний — с «замиранием»
  await spinReel(strips[0],centers[0],1200);
  await spinReel(strips[1],centers[1],1700);
  winbar.textContent="😮 Ещё чуть-чуть...";
  await spinReel(strips[2],centers[2],2500);

  // Выигрыш!
  payline.classList.remove("on"); void payline.offsetWidth; payline.classList.add("on");
  wonAmount=AMOUNTS[Math.floor(Math.random()*AMOUNTS.length)];
  spinsLeft--;
  updateSpins();
  onWin(isLast);
  spinning=false;
}

function onWin(isLast){
  sfxWin(); notify("success");
  coinShower();
  winbar.innerHTML="🎉 Выигрыш: <b>"+wonAmount.toLocaleString("ru-RU")+" ₽</b>";
  countUp(balEl,wonAmount);

  // Показываем эпичный оверлей
  showBigWin(wonAmount);

  if(isLast){
    // Больше спинов нет — предлагаем забрать
    spinBtn.style.display="none";
    hint.textContent="Заберите свой бонус 👇";
    claimBtn.style.display="block";
  }else{
    hint.textContent="Отличный результат! Крути ещё 🔥";
    spinBtn.disabled=false;
    // и кнопку забрать тоже показываем — можно забрать в любой момент
    claimBtn.style.display="block";
  }
}

/* ═══════════════ BIG WIN оверлей + count-up ═══════════════ */
const overlay=document.getElementById("overlay");
const prize=document.getElementById("prize");
function showBigWin(amount){
  overlay.classList.add("on");
  countUp(prize,amount,"<span>₽</span>");
  setTimeout(()=>overlay.classList.remove("on"),2200);
}
function countUp(el,to,suffix=" ₽"){
  const dur=1000, start=performance.now(), from=0;
  function step(now){
    const p=Math.min(1,(now-start)/dur);
    const val=Math.round((from+(to-from)*(1-Math.pow(1-p,3))));
    el.innerHTML=val.toLocaleString("ru-RU")+suffix;
    if(p<1){ if(val%500<40) sfxCoin(); requestAnimationFrame(step); }
    else el.innerHTML=to.toLocaleString("ru-RU")+suffix;
  }
  requestAnimationFrame(step);
}

/* ═══════════════ Монетопад ═══════════════ */
function coinShower(){
  const icons=["🪙","💰","💎","⭐"];
  for(let i=0;i<44;i++){
    const c=document.createElement("div");
    c.className="coin"; c.textContent=icons[Math.floor(Math.random()*icons.length)];
    c.style.left=Math.random()*100+"vw";
    c.style.fontSize=(18+Math.random()*20)+"px";
    document.body.appendChild(c);
    const dur=1200+Math.random()*1400, drift=(Math.random()-.5)*160;
    c.animate(
      [{transform:"translate(0,-40px) rotate(0)",opacity:1},
       {transform:`translate(${drift}px,105vh) rotate(${Math.random()*720}deg)`,opacity:.15}],
      {duration:dur,easing:"cubic-bezier(.3,.1,.6,1)"}
    ).onfinish=()=>c.remove();
  }
}

/* ═══════════════ Кнопки ═══════════════ */
spinBtn.addEventListener("click",doSpin);
claimBtn.addEventListener("click",()=>{
  if(finished) return;
  finished=true;
  haptic("medium");
  tg.sendData(JSON.stringify({bonus:wonAmount}));
  tg.close();
});
</script>
</body>
</html>
