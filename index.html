<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TalentPro Casino</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="css/style.css?v=8">
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="scan"></div>
  <div class="grain"></div>
  <div class="hud tl"></div><div class="hud tr"></div><div class="hud bl"></div><div class="hud br"></div>

  <div class="wrap">
    <div class="top">
      <div class="logo">Talent<i>Pro</i></div>
      <div class="balance"><small>Твой бонус</small><b id="bal">0 ₽</b></div>
    </div>

    <!-- ═══ Экран 1: выбор игры ═══ -->
    <section class="screen on" id="hub">
      <div class="headline">
        <span class="w w1">Выбери игру</span>
        <span class="w w2">Забери до 3 000 ₽</span>
      </div>
      <div class="games" id="games"></div>
      <div class="hintline">3 раунда · бонус растёт с каждым</div>
    </section>

    <!-- ═══ Экран 2: игра ═══ -->
    <section class="screen" id="game">
      <div class="gamebar">
        <button class="back" id="backBtn">‹ Игры</button>
        <div class="gname" id="gameName"></div>
        <div class="rounds" id="roundLabel">Раунд 1/3</div>
      </div>

      <div class="machine">
        <div class="cabinet">
          <span class="tick a"></span><span class="tick b"></span><span class="tick c"></span><span class="tick d"></span>
          <div class="marquee">
            <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
            <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
          </div>
          <div id="stage"></div>
        </div>
        <div class="winbar" id="winbar">Играем — деньги ждут</div>
      </div>

      <div class="controls">
        <button class="spin" id="actionBtn"><span>Крутить<small id="actionSub">Раунд 1/3</small></span></button>
        <div class="hintline" id="hint">Нажми на кнопку</div>
        <button class="claim" id="claimBtn">💸 Забрать бонус</button>
      </div>
    </section>
  </div>

  <div class="overlay" id="overlay">
    <div class="bigwin" id="bigwinTitle">Джекпот</div>
    <div class="prize" id="prize">0 <span>₽</span></div>
    <div class="ovsub">Бонус зачислен</div>
  </div>

<script src="js/core.js?v=8"></script>
<script src="js/slot.js?v=8"></script>
<script src="js/thimbles.js?v=8"></script>
<script src="js/chests.js?v=8"></script>
<script>TP.init();</script>
</body>
</html>
