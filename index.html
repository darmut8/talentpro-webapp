<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TalentPro Casino</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --acid:#B4FF00;        /* кислотно-зелёный с постера */
    --acid2:#C6FF3D;
    --acid-dim:#7ea800;
    --purple:#A855F7;      /* электро-фиолетовый */
    --purple2:#7C3AED;
    --bg:#000000;
    --panel:#0a0c0a;
    --line:rgba(180,255,0,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:'Arial Black','Segoe UI',system-ui,sans-serif;
    color:#fff;background:var(--bg);
    display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;position:relative;
  }

  /* ── Фон: неон-свечение + грид + сканлайны + зерно ── */
  .bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:var(--bg);}
  .bg::before{content:"";position:absolute;inset:-40%;
    background:
      radial-gradient(circle at 50% -5%, rgba(180,255,0,.18), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(168,85,247,.22), transparent 45%);
    animation:breathe 8s ease-in-out infinite alternate;}
  @keyframes breathe{from{opacity:.7;}to{opacity:1;}}
  .grid{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.35;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:42px 42px;
    mask-image:radial-gradient(circle at 50% 40%,#000 35%,transparent 78%);
    -webkit-mask-image:radial-gradient(circle at 50% 40%,#000 35%,transparent 78%);}
  .scan{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.5;
    background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.35) 2px 4px);
    animation:scanmove 8s linear infinite;}
  @keyframes scanmove{from{background-position-y:0;}to{background-position-y:200px;}}
  .grain{position:fixed;inset:0;z-index:3;opacity:.06;pointer-events:none;
    background-image:radial-gradient(#fff 1px,transparent 1px);background-size:3px 3px;}

  /* ── HUD-скобки по углам экрана ── */
  .hud{position:fixed;width:26px;height:26px;z-index:4;pointer-events:none;}
  .hud.tl{top:10px;left:10px;border-top:2px solid var(--acid);border-left:2px solid var(--acid);}
  .hud.tr{top:10px;right:10px;border-top:2px solid var(--purple);border-right:2px solid var(--purple);}
  .hud.bl{bottom:10px;left:10px;border-bottom:2px solid var(--purple);border-left:2px solid var(--purple);}
  .hud.br{bottom:10px;right:10px;border-bottom:2px solid var(--acid);border-right:2px solid var(--acid);}

  .wrap{position:relative;z-index:5;flex:1;display:flex;flex-direction:column;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));gap:12px;}

  /* ── Шапка ── */
  .top{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-style:italic;font-weight:900;font-size:22px;letter-spacing:.5px;
    color:var(--purple);text-shadow:0 0 14px rgba(168,85,247,.6);transform:skewX(-4deg);}
  .logo i{color:var(--acid);font-style:italic;text-shadow:0 0 14px rgba(180,255,0,.6);}
  .balance{position:relative;padding:8px 14px;background:#060806;
    border:1.5px solid var(--purple);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
    box-shadow:0 0 16px rgba(168,85,247,.3);text-align:right;}
  .balance small{display:block;font-size:8px;letter-spacing:2px;color:#7a7a7a;text-transform:uppercase;font-weight:700;}
  .balance b{font-size:18px;color:var(--acid);text-shadow:0 0 10px rgba(180,255,0,.5);font-variant-numeric:tabular-nums;font-style:italic;}

  /* заголовок в стиле постера */
  .headline{text-align:center;line-height:.95;margin:2px 0 4px;}
  .headline .w{display:block;font-style:italic;font-weight:900;text-transform:uppercase;transform:skewX(-6deg);}
  .headline .w1{font-size:15px;color:#fff;letter-spacing:2px;-webkit-text-stroke:.5px #444;}
  .headline .w2{font-size:34px;color:var(--acid);letter-spacing:1px;
    text-shadow:0 0 22px rgba(180,255,0,.55),0 2px 0 #2a3d00;}

  /* ── Автомат ── */
  .machine{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;}
  .cabinet{position:relative;width:100%;max-width:400px;padding:18px;background:var(--panel);
    border:2px solid var(--acid);
    clip-path:polygon(18px 0,100% 0,100% calc(100% - 18px),calc(100% - 18px) 100%,0 100%,0 18px);
    box-shadow:0 0 30px rgba(180,255,0,.22), inset 0 0 40px rgba(0,0,0,.9);}
  /* уголки-тики на автомате */
  .tick{position:absolute;width:14px;height:14px;z-index:2;}
  .tick.a{top:6px;left:6px;border-top:2px solid var(--acid);border-left:2px solid var(--acid);}
  .tick.b{top:6px;right:6px;border-top:2px solid var(--acid);border-right:2px solid var(--acid);}
  .tick.c{bottom:6px;left:6px;border-bottom:2px solid var(--acid);border-left:2px solid var(--acid);}
  .tick.d{bottom:6px;right:6px;border-bottom:2px solid var(--acid);border-right:2px solid var(--acid);}

  .marquee{display:flex;gap:6px;justify-content:center;margin-bottom:12px;}
  .bulb{width:8px;height:8px;background:var(--acid);box-shadow:0 0 10px var(--acid);animation:chase 1.1s infinite;}
  .bulb:nth-child(even){background:var(--purple);box-shadow:0 0 10px var(--purple);}
  .bulb:nth-child(1){animation-delay:0s}.bulb:nth-child(2){animation-delay:.14s}
  .bulb:nth-child(3){animation-delay:.28s}.bulb:nth-child(4){animation-delay:.42s}
  .bulb:nth-child(5){animation-delay:.56s}.bulb:nth-child(6){animation-delay:.7s}.bulb:nth-child(7){animation-delay:.84s}
  @keyframes chase{0%,100%{opacity:.2;}50%{opacity:1;}}

  .window{position:relative;display:flex;gap:8px;justify-content:center;background:#000;
    padding:12px;border:1.5px solid var(--line);overflow:hidden;}
  .reel{position:relative;width:33%;height:264px;overflow:hidden;background:#050705;
    border:1px solid rgba(180,255,0,.12);}
  .reel .strip{position:absolute;top:0;left:0;right:0;display:flex;flex-direction:column;align-items:center;will-change:transform;}
  .sym{height:88px;display:flex;align-items:center;justify-content:center;font-size:52px;
    filter:drop-shadow(0 0 6px rgba(180,255,0,.25));}
  .reel.blur .strip{filter:blur(3px);}
  .window::before,.window::after{content:"";position:absolute;left:0;right:0;height:66px;z-index:3;pointer-events:none;}
  .window::before{top:0;background:linear-gradient(180deg,#000,transparent);}
  .window::after{bottom:0;background:linear-gradient(0deg,#000,transparent);}

  .payline{position:absolute;left:6px;right:6px;top:50%;height:2px;transform:translateY(-50%);
    background:linear-gradient(90deg,transparent,var(--acid),transparent);opacity:0;z-index:4;box-shadow:0 0 14px var(--acid);}
  .payline.on{animation:plflash .45s ease 4;}
  @keyframes plflash{0%,100%{opacity:0;}50%{opacity:1;}}

  .winbar{height:24px;text-align:center;font-size:13px;letter-spacing:1px;color:#6f7a63;font-style:italic;font-weight:700;text-transform:uppercase;}
  .winbar b{color:var(--acid);text-shadow:0 0 12px rgba(180,255,0,.6);font-style:italic;}

  /* ── Кнопки ── */
  .controls{width:100%;max-width:400px;display:flex;flex-direction:column;gap:10px;align-items:center;}
  .spin{position:relative;width:100%;padding:20px;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--acid),var(--acid-dim));color:#0a0f00;
    font-family:inherit;font-style:italic;font-weight:900;font-size:22px;letter-spacing:2px;text-transform:uppercase;
    clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);
    box-shadow:0 0 28px rgba(180,255,0,.4);transition:transform .08s ease;transform:skewX(-3deg);}
  .spin span{display:inline-block;transform:skewX(3deg);}
  .spin:active{transform:skewX(-3deg) scale(.97);}
  .spin:disabled{filter:grayscale(.5) brightness(.6);cursor:not-allowed;}
  .spin small{display:block;font-size:10px;font-weight:700;letter-spacing:1px;opacity:.65;margin-top:3px;}

  .hintline{font-size:11px;color:#5f6a55;letter-spacing:1px;text-align:center;min-height:14px;text-transform:uppercase;font-weight:700;font-style:italic;}

  .claim{width:100%;border:2px solid var(--purple);cursor:pointer;
    background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;
    font-family:inherit;font-style:italic;font-weight:900;font-size:17px;letter-spacing:1px;text-transform:uppercase;padding:17px;
    clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);
    box-shadow:0 0 26px rgba(168,85,247,.5);display:none;animation:pulseC 1.3s ease-in-out infinite;}
  @keyframes pulseC{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
  .claim:active{transform:scale(.97);}

  /* ── BIG WIN overlay ── */
  .overlay{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    background:radial-gradient(circle at 50% 45%,rgba(10,20,0,.75),rgba(0,0,0,.94));}
  .overlay.on{display:flex;animation:fade .3s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .bigwin{font-style:italic;font-weight:900;font-size:46px;text-transform:uppercase;letter-spacing:2px;color:var(--acid);
    text-shadow:0 0 26px rgba(180,255,0,.8);transform:skewX(-6deg);animation:glitch .5s steps(2) 3;}
  @keyframes glitch{0%{transform:skewX(-6deg) translate(0,0);}
    25%{transform:skewX(-6deg) translate(-3px,1px);text-shadow:3px 0 var(--purple),-3px 0 var(--acid);}
    50%{transform:skewX(-6deg) translate(3px,-1px);}
    100%{transform:skewX(-6deg) translate(0,0);}}
  .prize{font-style:italic;font-weight:900;font-size:56px;color:#fff;text-shadow:0 0 24px rgba(180,255,0,.9);font-variant-numeric:tabular-nums;}
  .prize span{font-size:32px;color:var(--acid);}
  .ovsub{font-size:12px;color:#9aa08f;margin-top:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;font-style:italic;}

  .coin{position:fixed;top:-40px;font-size:24px;z-index:19;pointer-events:none;will-change:transform;}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="scan"></div>
  <div class="grain"></div>
  <div class="hud tl"></div><div class="hud tr"></div><div class="hud bl"></div><div class="hud br"></div>

  <div class="wrap">
    <div class="top">
      <div class="logo">Talent<i>Pro</i></div>
      <div class="balance"><small>Твой бонус</small><b id="bal">0 ₽</b></div>
    </div>

    <div class="headline">
      <span class="w w1">Заработать</span>
      <span class="w w2">Здесь и сейчас</span>
    </div>

    <div class="machine">
      <div class="cabinet">
        <span class="tick a"></span><span class="tick b"></span><span class="tick c"></span><span class="tick d"></span>
        <div class="marquee">
          <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
          <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
        </div>
        <div class="window">
          <div class="payline" id="payline"></div>
          <div class="reel"><div class="strip" id="r0"></div></div>
          <div class="reel"><div class="strip" id="r1"></div></div>
          <div class="reel"><div class="strip" id="r2"></div></div>
        </div>
      </div>
      <div class="winbar" id="winbar">Крути барабан — деньги ждут</div>
    </div>

    <div class="controls">
      <button class="spin" id="spinBtn"><span>Крутить<small id="spinsLeft">3 спина</small></span></button>
      <div class="hintline" id="hint">Нажми на кнопку</div>
      <button class="claim" id="claimBtn">💸 Забрать бонус</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="bigwin">Джекпот</div>
    <div class="prize" id="prize">0 <span>₽</span></div>
    <div class="ovsub">Бонус зачислен</div>
  </div>

<script>
/* ═══════════════ Telegram WebApp ═══════════════ */
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
try{ tg.setHeaderColor("#000000"); tg.setBackgroundColor("#000000"); }catch(e){}

/* ═══════════════ Настройки ═══════════════ */
const SYMBOLS=["🍒","🍋","🔔","⭐","💎","7️⃣","💵","💰"];
const JACKPOT="💰";
const AMOUNTS=[2000,2500,3000,3500,4000,4500,5000];
const SYM_H=88, VISIBLE=3, REEL_LEN=40;
let spinsLeft=3, finished=false, wonAmount=0, spinning=false;

/* ═══════════════ Звук (Web Audio) ═══════════════ */
let AC=null;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return AC; }
function tone(freq,dur,type="sine",vol=.2,delay=0){
  const c=ac(); if(!c) return;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(c.destination);
  const t=c.currentTime+delay;
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol,t+.01);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur); o.start(t); o.stop(t+dur);
}
function sfxSpin(){ const c=ac(); if(!c) return;
  const o=c.createOscillator(), g=c.createGain(); o.type="sawtooth";
  o.frequency.setValueAtTime(120,c.currentTime);
  o.frequency.exponentialRampToValueAtTime(440,c.currentTime+1.8);
  g.gain.setValueAtTime(.07,c.currentTime); g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+2.2);
  o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+2.2); }
function sfxStop(){ tone(320,.08,"square",.15); }
function sfxWin(){ [523,659,784,1047,1319].forEach((f,i)=>tone(f,.35,"triangle",.22,i*.1)); }
function sfxCoin(){ tone(880,.06,"sine",.12); tone(1320,.08,"sine",.1,.05); }
function haptic(t){ try{ tg.HapticFeedback.impactOccurred(t); }catch(e){} }
function notify(t){ try{ tg.HapticFeedback.notificationOccurred(t); }catch(e){} }

/* ═══════════════ Барабаны ═══════════════ */
const strips=[document.getElementById("r0"),document.getElementById("r1"),document.getElementById("r2")];
function rnd(){ return SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)]; }
function buildStrip(el,centerSym){
  el.style.transition="none"; el.style.transform="translateY(0)"; el.innerHTML="";
  const arr=[]; for(let i=0;i<REEL_LEN;i++) arr.push(rnd());
  const target=REEL_LEN-2; arr[target]=centerSym; arr[target-1]=Math.random()<.5?centerSym:rnd();
  arr.forEach(s=>{const d=document.createElement("div");d.className="sym";d.textContent=s;el.appendChild(d);});
  return target;
}
strips.forEach(el=>{el.innerHTML="";for(let i=0;i<VISIBLE+1;i++){const d=document.createElement("div");d.className="sym";d.textContent=rnd();el.appendChild(d);}});
function spinReel(el,centerSym,duration){
  return new Promise(resolve=>{
    const target=buildStrip(el,centerSym);
    const finalY=-(target-1)*SYM_H, reel=el.parentElement;
    reel.classList.add("blur"); el.style.transform="translateY(0)"; void el.offsetHeight;
    el.style.transition=`transform ${duration}ms cubic-bezier(.15,.85,.25,1.05)`;
    el.style.transform=`translateY(${finalY}px)`;
    const done=()=>{el.removeEventListener("transitionend",done);reel.classList.remove("blur");sfxStop();haptic("light");resolve();};
    el.addEventListener("transitionend",done);
  });
}

/* ═══════════════ Логика ═══════════════ */
const spinBtn=document.getElementById("spinBtn"),claimBtn=document.getElementById("claimBtn"),
  winbar=document.getElementById("winbar"),hint=document.getElementById("hint"),
  spinsLeftEl=document.getElementById("spinsLeft"),balEl=document.getElementById("bal"),payline=document.getElementById("payline");
function updateSpins(){ spinsLeftEl.textContent = spinsLeft>0 ? (spinsLeft+" спин"+(spinsLeft===1?"":spinsLeft<5?"а":"ов")) : ""; }
updateSpins();

async function doSpin(){
  if(spinning||finished) return;
  spinning=true; spinBtn.disabled=true;
  hint.textContent="Крутим... удача рядом"; winbar.textContent="🎰 Вращение...";
  ac(); if(AC&&AC.state==="suspended") AC.resume(); sfxSpin(); haptic("medium");
  const isLast=spinsLeft<=1;
  await spinReel(strips[0],JACKPOT,1200);
  await spinReel(strips[1],JACKPOT,1700);
  winbar.textContent="😮 Ещё чуть-чуть...";
  await spinReel(strips[2],JACKPOT,2500);
  payline.classList.remove("on"); void payline.offsetWidth; payline.classList.add("on");
  wonAmount=AMOUNTS[Math.floor(Math.random()*AMOUNTS.length)];
  spinsLeft--; updateSpins(); onWin(isLast); spinning=false;
}
function onWin(isLast){
  sfxWin(); notify("success"); coinShower();
  winbar.innerHTML="🎉 Выигрыш: <b>"+wonAmount.toLocaleString("ru-RU")+" ₽</b>";
  countUp(balEl,wonAmount); showBigWin(wonAmount);
  if(isLast){ spinBtn.style.display="none"; hint.textContent="Забери свой бонус"; claimBtn.style.display="block"; }
  else{ hint.textContent="Крути ещё — сумма может вырасти"; spinBtn.disabled=false; claimBtn.style.display="block"; }
}
const overlay=document.getElementById("overlay"),prize=document.getElementById("prize");
function showBigWin(amount){ overlay.classList.add("on"); countUp(prize,amount,"<span>₽</span>"); setTimeout(()=>overlay.classList.remove("on"),2200); }
function countUp(el,to,suffix=" ₽"){
  const dur=1000, start=performance.now();
  function step(now){ const p=Math.min(1,(now-start)/dur);
    const val=Math.round(to*(1-Math.pow(1-p,3)));
    el.innerHTML=val.toLocaleString("ru-RU")+suffix;
    if(p<1){ if(val%500<40) sfxCoin(); requestAnimationFrame(step); } else el.innerHTML=to.toLocaleString("ru-RU")+suffix;
  } requestAnimationFrame(step);
}
function coinShower(){
  const icons=["💰","💵","💎","⭐"];
  for(let i=0;i<44;i++){
    const c=document.createElement("div"); c.className="coin"; c.textContent=icons[Math.floor(Math.random()*icons.length)];
    c.style.left=Math.random()*100+"vw"; c.style.fontSize=(16+Math.random()*20)+"px"; document.body.appendChild(c);
    const dur=1200+Math.random()*1400, drift=(Math.random()-.5)*160;
    c.animate([{transform:"translate(0,-40px) rotate(0)",opacity:1},
      {transform:`translate(${drift}px,105vh) rotate(${Math.random()*720}deg)`,opacity:.15}],
      {duration:dur,easing:"cubic-bezier(.3,.1,.6,1)"}).onfinish=()=>c.remove();
  }
}
spinBtn.addEventListener("click",doSpin);
claimBtn.addEventListener("click",()=>{ if(finished) return; finished=true; haptic("medium"); tg.sendData(JSON.stringify({bonus:wonAmount})); tg.close(); });
</script>
</body>
</html>
