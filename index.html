<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TalentPro Casino</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
  <!-- SVG-спрайт: чашки и сундуки рисуем градиентами, а не emoji -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="gCup" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#dfffa0"/><stop offset=".35" stop-color="#B4FF00"/>
        <stop offset=".75" stop-color="#5f8a00"/><stop offset="1" stop-color="#2c4200"/>
      </linearGradient>
      <linearGradient id="gCupDark" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#7f9a3a"/><stop offset="1" stop-color="#1b2600"/>
      </linearGradient>
      <linearGradient id="gWood" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#c9a0ff"/><stop offset=".4" stop-color="#A855F7"/>
        <stop offset="1" stop-color="#43208a"/>
      </linearGradient>
      <linearGradient id="gGold" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#fffbe6"/><stop offset=".45" stop-color="#ffe066"/>
        <stop offset="1" stop-color="#b8860b"/>
      </linearGradient>
      <radialGradient id="gShine" cx=".5" cy=".5" r=".5">
        <stop offset="0" stop-color="#fff" stop-opacity=".9"/><stop offset="1" stop-color="#fff" stop-opacity="0"/>
      </radialGradient>

      <!-- Напёрсток -->
      <symbol id="cup" viewBox="0 0 100 110">
        <ellipse cx="50" cy="99" rx="34" ry="7" fill="#000" opacity=".55"/>
        <path d="M28 16h44l10 76a10 10 0 0 1-10 11H28a10 10 0 0 1-10-11z" fill="url(#gCup)"/>
        <path d="M28 16h44l2 14H26z" fill="#eaffb8" opacity=".55"/>
        <path d="M62 22l8 70a8 8 0 0 1-8 9h8a10 10 0 0 0 10-11l-10-68z" fill="#000" opacity=".22"/>
        <ellipse cx="38" cy="46" rx="6" ry="22" fill="url(#gShine)" opacity=".5"/>
        <ellipse cx="50" cy="16" rx="22" ry="5" fill="#dfffa0"/>
      </symbol>

      <!-- Сундук: крышка отдельным символом, чтобы откидываться rotateX.
           Низ крышки лежит ровно на y=max её viewBox, верх корпуса — на y=0. -->
      <symbol id="chestBody" viewBox="0 0 110 60" preserveAspectRatio="none">
        <rect x="10" y="0" width="90" height="50" rx="5" fill="url(#gWood)"/>
        <rect x="10" y="0" width="90" height="7" fill="#000" opacity=".28"/>
        <rect x="10" y="34" width="90" height="4" fill="#000" opacity=".18"/>
        <rect x="47" y="8" width="16" height="20" rx="3" fill="url(#gGold)"/>
        <circle cx="55" cy="19" r="3" fill="#3a2600"/>
        <ellipse cx="55" cy="55" rx="40" ry="5" fill="#000" opacity=".55"/>
      </symbol>
      <symbol id="chestLid" viewBox="0 0 110 30" preserveAspectRatio="none">
        <path d="M10 30V16a45 16 0 0 1 90 0v14z" fill="url(#gWood)"/>
        <path d="M10 30V16a45 16 0 0 1 90 0v3a45 13 0 0 0-90 0z" fill="#fff" opacity=".28"/>
        <rect x="47" y="20" width="16" height="10" rx="2" fill="url(#gGold)"/>
      </symbol>
      <symbol id="coin" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="18" fill="url(#gGold)"/>
        <circle cx="20" cy="20" r="13" fill="none" stroke="#8a6508" stroke-width="1.5" opacity=".5"/>
        <ellipse cx="14" cy="13" rx="5" ry="7" fill="#fff" opacity=".45" transform="rotate(-25 14 13)"/>
      </symbol>
    </defs>
  </svg>

  <div class="bg"></div>
  <canvas id="fx"></canvas>
  <div class="grid"></div>
  <div class="scan"></div>
  <div class="grain"></div>
  <div class="vignette"></div>
  <div class="hud tl"></div><div class="hud tr"></div><div class="hud bl"></div><div class="hud br"></div>

  <!-- Прелоадер: без него первый кадр моргает недорисованным -->
  <div class="loader" id="loader">
    <div class="lgo">Talent<i>Pro</i></div>
    <div class="lbar"><span id="lfill"></span></div>
    <div class="lsub">Загружаем зал…</div>
  </div>

  <div class="wrap">
    <div class="top">
      <div class="logo">Talent<i>Pro</i></div>
      <div class="balance"><small>Твой бонус</small><b id="bal">0 ₽</b></div>
    </div>

    <!-- ═══ Экран 1: выбор игры ═══ -->
    <section class="screen on" id="hub">
      <div class="headline">
        <span class="w w1">Выбери игру</span>
        <span class="w w2">Забери до 3 000 ₽</span>
      </div>
      <div class="games" id="games"></div>
      <div class="hintline">3 раунда · бонус растёт с каждым</div>
    </section>

    <!-- ═══ Экран 2: игра ═══ -->
    <section class="screen" id="game">
      <div class="gamebar">
        <button class="back" id="backBtn">‹ Игры</button>
        <div class="gname" id="gameName"></div>
        <div class="rounds" id="roundLabel">Раунд 1/3</div>
      </div>

      <div class="machine">
        <div class="cabinet">
          <span class="tick a"></span><span class="tick b"></span><span class="tick c"></span><span class="tick d"></span>
          <div class="marquee">
            <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
            <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
          </div>
          <div id="stage"></div>
        </div>
        <div class="winbar" id="winbar">Играем — деньги ждут</div>
      </div>

      <div class="controls">
        <button class="spin" id="actionBtn"><span>Крутить<small id="actionSub">Раунд 1/3</small></span></button>
        <div class="hintline" id="hint">Нажми на кнопку</div>
        <button class="claim" id="claimBtn">💸 Забрать бонус</button>
      </div>
    </section>
  </div>

  <div class="overlay" id="overlay">
    <div class="rays"></div>
    <div class="bigwin" id="bigwinTitle">Джекпот</div>
    <div class="prize" id="prize">0 <span>₽</span></div>
    <div class="ovsub">Бонус зачислен</div>
  </div>

<script src="js/fx.js?v=9"></script>
<script src="js/core.js?v=9"></script>
<script src="js/slot.js?v=9"></script>
<script src="js/thimbles.js?v=9"></script>
<script src="js/chests.js?v=9"></script>
<script>TP.init();</script>
</body>
</html>
